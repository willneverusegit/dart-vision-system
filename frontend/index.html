<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dart Vision</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <h1 class="logo">Dart Vision</h1>
    <nav class="nav">
      <a href="#setup" class="nav-link" data-page="setup">Setup</a>
      <a href="#calibration" class="nav-link" data-page="calibration">Calibration</a>
      <a href="#game" class="nav-link" data-page="game">Game</a>
    </nav>
  </header>

  <main id="app">
    <!-- Setup Page -->
    <section id="page-setup" class="page">
      <h2>Setup</h2>
      <div class="setup-section">
        <h3>Profilverwaltung</h3>
        <div class="profile-controls">
          <select id="profile-select" class="select"></select>
          <button id="btn-load-profile" class="btn">Laden</button>
          <button id="btn-delete-profile" class="btn btn-danger">L\u00f6schen</button>
        </div>
        <div class="profile-save">
          <input id="profile-name" type="text" class="input" placeholder="Profilname">
          <button id="btn-save-profile" class="btn btn-primary">Speichern</button>
        </div>
        <div id="profile-status" class="status-msg"></div>
      </div>
    </section>

    <!-- Calibration Page -->
    <section id="page-calibration" class="page">
      <h2>Kalibrierung</h2>
      <p>Kalibrierungs-Assistent (coming soon)</p>
    </section>

    <!-- Game Page -->
    <section id="page-game" class="page">
      <div class="game-layout">
        <div class="board-container">
          <canvas id="dartboard" width="500" height="500"></canvas>
        </div>
        <div class="score-panel">
          <div id="game-controls">
            <button id="btn-start-game" class="btn btn-primary">Neues Spiel</button>
            <button id="btn-stop-game" class="btn btn-danger" disabled>Spiel beenden</button>
          </div>
          <div id="current-score" class="score-display">
            <h3>Score</h3>
            <div id="score-popup-container" class="score-popup-container"></div>
            <div id="score-value" class="score-big">0</div>
          </div>
          <div id="last-throw" class="last-throw"></div>
          <div id="throw-history">
            <h3>Wurf-Historie</h3>
            <ul id="history-list"></ul>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
